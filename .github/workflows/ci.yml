name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[dev]
      - run: python -m ruff check .
      - run: python -m mypy
      - run: python -m pytest
      - run: python -m build --wheel
      - run: python scripts/verify_wheel_skill_bundle.py
