[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "claude-loop"
version = "0.0.1"
description = "claude-loop PoC: a minimal gather->act->verify->repeat loop core with composable stop conditions."
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.hatch.build.targets.wheel]
packages = ["src/claude_loop"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
